<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:linear-gradient(135deg,#1a3a5c 0%,#2e86c1 100%)">
  <div class="card shadow-lg border-0" style="width:420px;border-radius:16px">
    <div class="card-body p-5">
      <!-- Logo / Header -->
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
             style="width:70px;height:70px;background:#1a3a5c">
          <i class="bi bi-mortarboard-fill text-white fs-2"></i>
        </div>
        <h5 class="fw-bold mb-0">وزارة التربية والتعليم</h5>
        <p class="text-muted small mb-0">نظام إدارة مشاريع المكتب الفني</p>
      </div>

      @if (error) {
        <div class="alert alert-danger py-2 small text-center">{{ error }}</div>
      }

      <form (ngSubmit)="submit()" #f="ngForm">
        <div class="mb-3">
          <label class="form-label fw-semibold">البريد الإلكتروني</label>
          <input type="email" class="form-control" [(ngModel)]="email" name="email"
                 placeholder="example@moe.gov.qa" required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">كلمة المرور</label>
          <input type="password" class="form-control" [(ngModel)]="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold"
                [disabled]="loading || f.invalid" style="background:#1a3a5c;border-color:#1a3a5c">
          @if (loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
          تسجيل الدخول
        </button>
      </form>
    </div>
  </div>
</div>
