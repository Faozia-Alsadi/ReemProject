<div class="d-flex" style="min-height:100vh">
  <!-- Sidebar -->
  <nav class="d-flex flex-column p-3 text-white" style="width:240px;min-height:100vh;background:#1a3a5c">
    <!-- Logo -->
    <div class="text-center mb-4 pt-2">
      <div class="fw-bold fs-6">وزارة التربية والتعليم</div>
      <div class="text-white-50 small">والتعليم العالي</div>
      <hr class="border-secondary">
    </div>

    <!-- User info -->
    <div class="d-flex align-items-center gap-2 mb-4 p-2 rounded" style="background:rgba(255,255,255,0.1)">
      <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold"
           style="width:38px;height:38px;background:#e74c3c;font-size:14px">
        {{ auth.currentUser()?.fullNameAr?.charAt(0) }}
      </div>
      <div class="overflow-hidden">
        <div class="small fw-semibold text-truncate">{{ auth.currentUser()?.fullNameAr }}</div>
        <div class="text-white-50" style="font-size:11px">{{ auth.currentUser()?.role === 'Admin' ? 'مدير النظام' : 'مدير مشروع' }}</div>
      </div>
    </div>

    <!-- Nav links -->
    <ul class="nav nav-pills flex-column gap-1 flex-grow-1">
      <li class="nav-item">
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-link text-white d-flex align-items-center gap-2">
          <i class="bi bi-speedometer2"></i> لوحة المعلومات
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/projects" routerLinkActive="active" class="nav-link text-white d-flex align-items-center gap-2">
          <i class="bi bi-kanban"></i> المشاريع
        </a>
      </li>
      @if (auth.isAdmin()) {
        <li class="nav-item">
          <a routerLink="/users" routerLinkActive="active" class="nav-link text-white d-flex align-items-center gap-2">
            <i class="bi bi-people"></i> المستخدمون
          </a>
        </li>
      }
    </ul>

    <button class="btn btn-outline-light btn-sm d-flex align-items-center gap-2" (click)="auth.logout()">
      <i class="bi bi-box-arrow-right"></i> تسجيل الخروج
    </button>
  </nav>

  <!-- Main content -->
  <main class="flex-grow-1 p-4" style="background:#f4f6f9;overflow-y:auto">
    <router-outlet />
  </main>
</div>
